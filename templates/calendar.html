<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Race Calendar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Malgun Gothic', sans-serif; }
        .f1-header { background-color: #e10600; color: white; padding: 1.5rem 0; margin-bottom: 2rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .f1-logo { color: white; text-decoration: none; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .table-f1 th { background-color: #212529; color: white; text-align: center; font-size: 0.9rem; }
        .table-f1 td { vertical-align: middle; text-align: center; font-size: 0.9rem; }
        .past-race { color: #adb5bd; background-color: #f1f3f5 !important; }
    </style>
</head>
<body>

    <header class="f1-header text-center">
        <div class="container">
            <h1 class="fw-bold m-0"><a href="/" class="f1-logo">🏎️ LecLovF1</a></h1>
        </div>
    </header>

    <main class="container">
        <div class="row">
            <div class="col-lg-9 mx-auto">
                <div class="card p-4">
                    <div class="table-responsive">
                        <table class="table table-hover table-bordered table-f1 mb-0">
                            <thead>
                                <tr>
                                    <th style="width: 15%;">라운드</th>
                                    <th style="width: 35%;">그랑프리</th>
                                    <th style="width: 32%;">서킷 위치</th>
                                    <th style="width: 18%;">결승 일자</th>
                                </tr>
                            </thead>
                            <tbody id="calendar-rows">
                                <tr>
                                    <td colspan="4" class="text-center py-5 text-muted">로드 중...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const apiUrl = "https://api.jolpi.ca/ergast/f1/2026.json";
            const tableBody = document.getElementById("calendar-rows");
            const today = new Date();

            fetch(apiUrl)
                .then(res => res.json())
                .then(data => {
                    const races = data.MRData.RaceTable.Races;
                    let htmlContent = "";

                    races.forEach(race => {
                        const raceDate = new Date(race.date);
                        let rowClass = raceDate < today ? "past-race" : "";

                        htmlContent += `
                            <tr class="${rowClass}">
                                <td class="fw-bold text-secondary">${race.round} Rd</td>
                                <td class="text-start ps-3 fw-bold">${race.raceName}</td>
                                <td class="text-start ps-3 small text-muted">📍 ${race.Circuit.Location.locality}, ${race.Circuit.Location.country}</td>
                                <td class="fw-bold">${race.date}</td>
                            </tr>
                        `;
                    });
                    tableBody.innerHTML = htmlContent;
                });
        });
    </script>
</body>
</html>
