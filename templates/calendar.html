<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏎️ LecLovF1 - Race Calendar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Malgun Gothic', sans-serif; margin: 0; padding: 0; }
        .f1-header { background-color: #e10600; color: white; padding: 1.2rem 0; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .f1-logo { color: white; text-decoration: none; font-weight: bold; font-size: 1.5rem; }
        .f1-logo:hover { color: rgba(255,255,255,0.8); }
 
        .calendar-scroll-wrapper {
            background-color: #1f2124; padding: 1.2rem 1rem; display: flex; overflow-x: auto; gap: 1rem; scroll-behavior: smooth; border-bottom: 5px solid #e10600; min-height: 175px; align-items: center;
        }
        .calendar-scroll-wrapper::-webkit-scrollbar { height: 6px; }
        .calendar-scroll-wrapper::-webkit-scrollbar-track { background: #1f2124; }
        .calendar-scroll-wrapper::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
        .calendar-scroll-wrapper::-webkit-scrollbar-thumb:hover { background: #e10600; }
 
        .mini-race-card {
            flex: 0 0 240px; background-color: #2d3035; border-radius: 12px; padding: 1rem; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.15); transition: transform 0.2s, border-color 0.2s; display: flex; flex-direction: column; justify-content: space-between; border: 2px solid transparent; cursor: pointer; min-height: 145px;
        }
        .mini-race-card:hover { transform: translateY(-2px); border-color: rgba(255, 255, 255, 0.2); }
 
        .mini-race-card.current-race {
            background: linear-gradient(135deg, #ffc107 0%, #ff9800 100%) !important; color: #1f2124 !important; font-weight: bold; box-shadow: 0 6px 15px rgba(255, 193, 7, 0.4); border: 2px solid #ffffff !important; opacity: 1 !important;
        }
        .mini-race-card.current-race .race-round, .mini-race-card.current-race .race-loc, .mini-race-card.current-race .race-date, .mini-race-card.current-race .scroll-winner-name { color: rgba(31, 33, 36, 0.75) !important; }
 
        .mini-race-card.has-team-color { color: #ffffff !important; }
        .mini-race-card.has-team-color .race-round { color: rgba(255, 255, 255, 0.6) !important; }
        .mini-race-card.has-team-color .race-date { color: #ffffff !important; opacity: 0.9; }
        .mini-race-card.has-team-color .scroll-winner-name { color: #ffeb3b !important; }
        .mini-race-card.selected-card { border: 2px solid #e10600 !important; box-shadow: 0 0 12px rgba(225, 6, 0, 0.6); }
        .mini-race-card.past-race { opacity: 0.85; background-color: #1a1c1e; }
 
        .race-round { font-size: 0.85rem; font-weight: bold; letter-spacing: 1px; }
        .race-title { font-size: 1.1rem; font-weight: bold; margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .race-loc { font-size: 0.8rem; margin-top: 2px; }
        .race-date { font-size: 0.9rem; font-weight: bold; margin-top: 6px; text-align: right; }
 
        .scroll-winner-container { display: flex; align-items: center; gap: 8px; margin-top: 8px; background-color: rgba(255,255,255,0.12); padding: 4px 8px; border-radius: 6px; }
        .mini-race-card.current-race .scroll-winner-container { background-color: rgba(0, 0, 0, 0.06); }
        .scroll-winner-thumb { width: 26px; height: 26px; border-radius: 50%; object-fit: cover; object-position: center 15%; background-color: white; border: 1px solid rgba(255,255,255,0.3); display: none; }
        .scroll-winner-name { font-size: 0.75rem; font-weight: bold; color: #ffc107; }
 
        /* 🏁 디테일 섹션 배경 */
        .race-detail-section { position: relative; background-color: #1f2124; color: white; min-height: 400px; border-radius: 24px; overflow: hidden; padding: 2.5rem !important; box-shadow: 0 15px 35px rgba(0,0,0,0.15); }
        .race-detail-section::before {
            content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-image: var(--detail-bg, none); background-size: cover; background-position: center; filter: blur(25px) brightness(0.2); transform: scale(1.1); z-index: 0; transition: background-image 0.4s ease-in-out;
        }
        .race-detail-section > * { position: relative; z-index: 1; }
 
        /* 🏆 중앙 집중형 자이언트 포디움 디자인 */
        .huge-podium-container { display: flex; justify-content: center; gap: 25px; align-items: flex-end; height: 350px; margin-top: 20px; width: 100%; border-bottom: 2px solid rgba(255,255,255,0.1); padding-bottom: 0; }
        .huge-podium-step {
            border-radius: 20px 20px 0 0; padding: 20px 10px; text-align: center; display: flex; flex-direction: column; align-items: center;
            width: 26%; box-shadow: 0 -10px 40px rgba(0,0,0,0.4); transition: transform 0.3s ease; position: relative;
        }
        .huge-podium-step:hover { transform: translateY(-5px); }
        
        .huge-p-1 { height: 100%; z-index: 3; border-top: 3px solid rgba(255,255,255,0.5); border-left: 1px solid rgba(255,255,255,0.2); border-right: 1px solid rgba(255,255,255,0.2); }
        .huge-p-2 { height: 75%; z-index: 2; border-top: 3px solid rgba(255,255,255,0.3); border-left: 1px solid rgba(255,255,255,0.1); border-right: 1px solid rgba(255,255,255,0.1); }
        .huge-p-3 { height: 60%; z-index: 1; border-top: 3px solid rgba(255,255,255,0.2); border-left: 1px solid rgba(255,255,255,0.1); border-right: 1px solid rgba(255,255,255,0.1); }
        
        .huge-avatar { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; object-position: center 15%; border: 4px solid rgba(255, 255, 255, 0.6); background-color: white; margin-bottom: 12px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); display: none; }
        .huge-p-1 .huge-avatar { width: 130px; height: 130px; border-color: #ffc107; box-shadow: 0 0 30px rgba(255, 193, 7, 0.4); }
        
        .huge-rank-icon { font-size: 2rem; line-height: 1; margin-bottom: 5px; text-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .huge-p-1 .huge-rank-icon { font-size: 2.8rem; }
        .huge-driver-name { font-size: 1.1rem; font-weight: bold; color: white; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        .huge-p-1 .huge-driver-name { font-size: 1.5rem; color: #ffc107; }
 
        /* 🎖️ 부가 칭호 뱃지 (스프린트, 폴포지션, 패스티스트랩) */
        .accolade-badges { display: flex; flex-direction: column; gap: 6px; margin-top: 15px; width: 100%; align-items: center; }
        .accolade-badge { font-size: 0.75rem; font-weight: bold; padding: 5px 10px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.5); width: 85%; text-align: center; letter-spacing: -0.5px; }
        .badge-sprint { background-color: #0dcaf0; color: #000; }     /* 하늘색 */
        .badge-fastest { background-color: #800080; color: #fff; }    /* 보라색 */
        .badge-pole { background-color: #dc3545; color: #fff; }       /* 빨간색 */
 
        /* 기타 스타일 */
        .detail-img-wrapper { width: 100%; height: 200px; display: flex; align-items: center; justify-content: center; }
        .detail-circuit-map { width: 100%; height: 100%; object-fit: contain; border-radius: 16px; padding: 10px; background-color: rgba(255, 255, 255, 0.95); box-shadow: 0 8px 20px rgba(0,0,0,0.4); display: none; }
        .wiki-extract-box { font-size: 0.95rem; line-height: 1.6; color: rgba(255,255,255,0.85); background-color: rgba(0,0,0,0.25); padding: 15px; border-radius: 10px; border-left: 3px solid #ffc107; height: 100%; }
        
        .content-container { max-width: 1200px; margin: 2.5rem auto; padding: 0 1rem; }
        .back-btn { background-color: #212529; color: white; border: none; padding: 0.6rem 1.5rem; border-radius: 8px; font-weight: bold; transition: background-color 0.2s; }
        .back-btn:hover { background-color: #e10600; color: white; }
    </style>
</head>
<body>
 
    <header class="f1-header text-center">
        <div class="container">
            <h1 class="fw-bold m-0"><a href="/" class="f1-logo">🏎️ LecLovF1</a></h1>
        </div>
    </header>
 
    <div id="calendar-scroll-box" class="calendar-scroll-wrapper">
        <div class="text-white mx-auto d-flex align-items-center gap-3 py-4">
            <div class="spinner-border text-danger spinner-border-sm"></div>
            <span>대시보드 라이브 데이터 로드 중...</span>
        </div>
    </div>
 
    <div class="content-container">
        <div class="card race-detail-section mb-4" id="detail-panel">
            <div class="container-fluid p-0">
                
                <div class="row mb-4" id="detail-header-row">
                    <div class="col-12 text-center" id="detail-text-col">
                        <span id="detail-round" class="badge bg-danger px-3 py-1.5 mb-2 fs-6">ROUND 00</span>
                        <h1 id="detail-title" class="display-5 fw-bold text-warning m-0">그랑프리를 선택해 주세요</h1>
                        <p id="detail-circuit-name" class="fs-4 text-white-50 m-0 mt-1">로딩 중...</p>
                        <p id="detail-location" class="fs-5 text-muted m-0">📍 위치 로딩 중... | 📅 <span id="detail-date" class="text-danger">0000-00-00</span></p>
                    </div>
                </div>
 
                <div class="row d-none" id="main-podium-row">
                    <div class="col-12">
                        <div class="huge-podium-container" id="huge-podium-box"></div>
                    </div>
                </div>
 
                <div class="row mt-4 g-4 align-items-stretch" id="bottom-info-row">
                    <div class="col-md-8">
                        <div id="detail-wiki" class="wiki-extract-box">레이스를 동기화하는 중입니다.</div>
                    </div>
                    <div class="col-md-4">
                        <div class="detail-img-wrapper">
                            <img id="detail-map-img" class="detail-circuit-map" src="" alt="Circuit Map">
                        </div>
                    </div>
                </div>
 
                <div id="weekend-sessions-row" class="row mt-5 pt-4 border-top border-secondary d-none mx-0">
                    <div class="col-12 px-0">
                        <h5 class="text-warning fw-bold mb-3">📋 그랑프리 세션 리포트 (<span id="session-season-tag" class="text-white-50"></span>)</h5>
                        <div class="row g-3" id="session-tables-container"></div>
                    </div>
                </div>
 
            </div>
        </div>
 
        <div class="text-center mt-4"><button class="back-btn" onclick="location.href='/'">← 메인 대시보드로 돌아가기</button></div>
    </div>
 
    <script>
        const TEAM_COLORS = {
            "ferrari": "#cc0000", "mclaren": "#ff8700", "redbull": "#061043", "mercedes": "#00a19c",
            "astonmartin": "#006f62", "aston": "#006f62", "alpine": "#0090ff", "williams": "#005aff",
            "haas": "#787878", "audi": "#c41130", "sauber": "#c41130", "rb": "#002fa7", "racingbulls": "#002fa7"
        };
        function getTeamHex(cid) {
            if(!cid) return "#1a1c1e";
            const key = cid.toLowerCase().replace(/[^a-z]/g, '');
            for(let k in TEAM_COLORS) { if(key.includes(k)) return TEAM_COLORS[k]; }
            return "#1a1c1e";
        }
 
        document.addEventListener("DOMContentLoaded", function() {
            const scrollBox = document.getElementById("calendar-scroll-box");
            let localRacesArray = [];
 
            function loadWeekendSessions(round, isPast) {
                const sessionRow = document.getElementById("weekend-sessions-row");
                const tablesContainer = document.getElementById("session-tables-container");
                const seasonTag = document.getElementById("session-season-tag");
                const seasonParam = isPast ? "current" : "2025";
                
                seasonTag.innerText = isPast ? "2026 Live 시즌 데이터" : "2025 전 시즌 데이터 참조";
                sessionRow.classList.remove("d-none");
                tablesContainer.innerHTML = `<div class="text-center w-100 py-3 text-white-50"><div class="spinner-border text-warning spinner-border-sm me-2"></div>세션별 세부 기록 스트리밍 중...</div>`;
                
                fetch(`/api/race-sessions/${round}?season=${seasonParam}`)
                    .then(res => res.ok ? res.json() : null)
                    .then(data => {
                        if(!data) {
                            tablesContainer.innerHTML = `<div class="text-center text-danger w-100 py-2">세션 API 연동 누락 (서버 확인 필요)</div>`;
                            return;
                        }
                        let html = "";
                        if (data.schedule && Object.keys(data.schedule).length > 0) {
                            const s = data.schedule;
                            html += `
                                <div class="col-md-3">
                                    <div class="p-2.5 rounded h-100" style="background-color: rgba(0,0,0,0.25); font-size:0.8rem; border-left: 2px solid #e10600; padding: 10px;">
                                        <div class="fw-bold text-danger mb-2">⏱️ WEEKEND TIMELINE</div>
                                        <div class="d-flex justify-content-between mb-1"><span>FP1 일정:</span><span class="text-white-50">${s.fp1}</span></div>
                                        <div class="d-flex justify-content-between mb-1"><span>FP2 일정:</span><span class="text-white-50">${s.fp2}</span></div>
                                        <div class="d-flex justify-content-between mb-1"><span>FP3 일정:</span><span class="text-white-50">${s.fp3}</span></div>
                                        <div class="d-flex justify-content-between mb-1"><span class="text-info fw-bold">Quali 예선:</span><span class="text-info">${s.qualifying}</span></div>
                                        ${s.sprint !== "-" ? `<div class="d-flex justify-content-between mb-1"><span class="text-success fw-bold">Sprint 예선:</span><span class="text-success">${s.sprint}</span></div>` : ""}
                                        <div class="d-flex justify-content-between"><span>Race 결승:</span><span class="text-warning fw-bold">${s.race}</span></div>
                                    </div>
                                </div>
                            `;
                        }
                        if (data.qualifying && data.qualifying.length > 0) {
                            let rows = data.qualifying.map(q => `<div class="d-flex justify-content-between border-bottom border-secondary border-opacity-25 py-1"><span class="text-info fw-bold" style="width:15px;">${q.position}</span><span class="text-truncate flex-grow-1 mx-2" style="max-width:100px;">${q.driver.split(" ")[1] || q.driver}</span><span class="text-white-50 text-end text-truncate" style="font-size:0.7rem; max-width:65px;">${q.time}</span></div>`).join('');
                            html += `<div class="col-md-3"><div class="p-2.5 rounded h-100" style="background-color: rgba(0,0,0,0.25); font-size:0.8rem; border-left: 2px solid #00a19c; padding: 10px;"><div class="fw-bold text-info mb-2">⏱️ QUALIFYING TOP 5</div>${rows}</div></div>`;
                        } else { html += `<div class="col-md-3"><div class="p-3 text-center text-muted rounded h-100 d-flex align-items-center justify-content-center" style="background-color: rgba(0,0,0,0.25); font-size:0.8rem;">예선 데이터 제공 불가</div></div>`; }
                        
                        if (data.sprint && data.sprint.length > 0) {
                            let rows = data.sprint.map(s => `<div class="d-flex justify-content-between border-bottom border-secondary border-opacity-25 py-1"><span class="text-success fw-bold" style="width:15px;">${s.position}</span><span class="text-truncate flex-grow-1 mx-2">${s.driver.split(" ")[1] || s.driver}</span><span class="text-warning font-monospace">${s.points}P</span></div>`).join('');
                            html += `<div class="col-md-3"><div class="p-2.5 rounded h-100" style="background-color: rgba(0,0,0,0.25); font-size:0.8rem; border-left: 2px solid #ff8700; padding: 10px;"><div class="fw-bold text-success mb-2">🏃‍♂️ SPRINT RACE TOP 5</div>${rows}</div></div>`;
                        } else { html += `<div class="col-md-3"><div class="p-3 text-center text-muted rounded h-100 d-flex align-items-center justify-content-center" style="background-color: rgba(0,0,0,0.25); font-size:0.8rem;">스프린트 미개최 주간</div></div>`; }
                        
                        if (data.race && data.race.length > 0) {
                            let rows = data.race.map(r => `<div class="d-flex justify-content-between border-bottom border-secondary border-opacity-25 py-1"><span class="text-warning fw-bold" style="width:15px;">${r.position}</span><span class="text-truncate flex-grow-1 mx-2">${r.driver.split(" ")[1] || r.driver}</span><span class="text-warning fw-bold font-monospace">${r.points}P</span></div>`).join('');
                            html += `<div class="col-md-3"><div class="p-2.5 rounded h-100" style="background-color: rgba(0,0,0,0.25); font-size:0.8rem; border-left: 2px solid #ffc107; padding: 10px;"><div class="fw-bold text-warning mb-2">🏆 MAIN RACE TOP 5</div>${rows}</div></div>`;
                        } else { html += `<div class="col-md-3"><div class="p-3 text-center text-muted rounded h-100 d-flex align-items-center justify-content-center" style="background-color: rgba(0,0,0,0.25); font-size:0.8rem;">레이스 개최 전</div></div>`; }
                        tablesContainer.innerHTML = html;
                    }).catch(() => { tablesContainer.innerHTML = `<div class="text-danger text-center w-100 py-3" style="font-size:0.8rem;">데이터 동기화 실패</div>`; });
            }
 
            function renderDetailPanel(race) {
                document.getElementById("detail-round").innerText = `ROUND ${race.round}`;
                document.getElementById("detail-title").innerText = race.raceName;
                document.getElementById("detail-circuit-name").innerText = race.circuit_name;
                // detail-location 안에는 detail-date span이 중첩되어 있으므로 innerText로 통째로 덮으면 안 됨(자식 노드 파괴 → 다음 줄에서 null 참조 크래시).
                // innerHTML로 span을 포함해 한 번에 재생성한다.
                document.getElementById("detail-location").innerHTML = `📍 ${race.locality} | 📅 <span id="detail-date" class="text-danger">${race.date}</span>`;
                document.getElementById("detail-panel").style.setProperty('--detail-bg', `url('${race.flag_url}')`);
 
                fetch(`/api/wiki-meta/${race.circuit_wiki_title}`)
                    .then(res => res.ok ? res.json() : null)
                    .then(wiki => {
                        document.getElementById("detail-wiki").innerText = wiki ? wiki.extract : "요약 정보를 받아올 수 없습니다.";
                        const mapImg = document.getElementById("detail-map-img");
                        if(wiki && wiki.image) { mapImg.src = wiki.image; mapImg.style.display = "block"; } 
                        else { mapImg.style.display = "none"; }
                    }).catch(() => { document.getElementById("detail-wiki").innerText = "위키 백과 피드 연동 지연 발생."; });
 
                const podiumRow = document.getElementById("main-podium-row");
                
                if (race.is_past) {
                    podiumRow.classList.remove("d-none");
                    Promise.all([
                        fetch(`/api/race-podium/${race.round}`).then(r=>r.json()).catch(()=>null),
                        fetch(`https://api.jolpi.ca/ergast/f1/current/${race.round}/results.json`).then(r=>r.json()).catch(()=>null),
                        fetch(`https://api.jolpi.ca/ergast/f1/current/${race.round}/sprint.json`).then(r=>r.json()).catch(()=>null)
                    ]).then(([podium, jolpiRes, jolpiSprint]) => {
                        if (podium && podium.length >= 3) {
                            let poleDriver = "", flDriver = "", sprintWinner = "";
                            if (jolpiRes?.MRData?.RaceTable?.Races[0]?.Results) {
                                const results = jolpiRes.MRData.RaceTable.Races[0].Results;
                                const pole = results.find(r => r.grid === "1");
                                const fl = results.find(r => r.FastestLap && r.FastestLap.rank === "1");
                                if (pole) poleDriver = pole.Driver.familyName;
                                if (fl) flDriver = fl.Driver.familyName;
                            }
                            if (jolpiSprint?.MRData?.RaceTable?.Races[0]?.SprintResults) {
                                const sw = jolpiSprint.MRData.RaceTable.Races[0].SprintResults[0];
                                if (sw) sprintWinner = sw.Driver.familyName;
                            }
 
                            const getBadges = (familyName) => {
                                let b = '';
                                if (familyName === poleDriver) b += `<span class="accolade-badge badge-pole">🎯 Pole Position</span>`;
                                if (familyName === sprintWinner) b += `<span class="accolade-badge badge-sprint">🏃‍♂️ Sprint Win</span>`;
                                if (familyName === flDriver) b += `<span class="accolade-badge badge-fastest">⏱️ Fastest Lap</span>`;
                                return b ? `<div class="accolade-badges">${b}</div>` : '';
                            };
 
                            const d1 = podium.find(p => p.position === "1");
                            const d2 = podium.find(p => p.position === "2");
                            const d3 = podium.find(p => p.position === "3");
 
                            if(d1 && d2 && d3) {
                                const c1 = getTeamHex(d1.constructorId), c2 = getTeamHex(d2.constructorId), c3 = getTeamHex(d3.constructorId);
                                document.getElementById("huge-podium-box").innerHTML = `
                                    <div class="huge-podium-step huge-p-2" style="background: linear-gradient(to top, ${c2}88, ${c2}11); border-color: ${c2};">
                                        <img class="huge-avatar" id="huge-ava-2" src="" alt="2nd">
                                        <div class="huge-rank-icon">🥈</div>
                                        <div class="huge-driver-name">${d2.familyName}</div>
                                        ${getBadges(d2.familyName)}
                                    </div>
                                    <div class="huge-podium-step huge-p-1" style="background: linear-gradient(to top, ${c1}99, ${c1}22); border-color: ${c1};">
                                        <img class="huge-avatar" id="huge-ava-1" src="" alt="1st">
                                        <div class="huge-rank-icon">🥇</div>
                                        <div class="huge-driver-name">${d1.familyName}</div>
                                        ${getBadges(d1.familyName)}
                                    </div>
                                    <div class="huge-podium-step huge-p-3" style="background: linear-gradient(to top, ${c3}88, ${c3}11); border-color: ${c3};">
                                        <img class="huge-avatar" id="huge-ava-3" src="" alt="3rd">
                                        <div class="huge-rank-icon">🥉</div>
                                        <div class="huge-driver-name">${d3.familyName}</div>
                                        ${getBadges(d3.familyName)}
                                    </div>
                                `;
 
                                fetch(`/api/wiki-meta/${d1.wiki_title}`).then(r=>r.json()).then(w => { if(w?.image) { const i=document.getElementById("huge-ava-1"); i.src=w.image; i.style.display="block"; } });
                                fetch(`/api/wiki-meta/${d2.wiki_title}`).then(r=>r.json()).then(w => { if(w?.image) { const i=document.getElementById("huge-ava-2"); i.src=w.image; i.style.display="block"; } });
                                fetch(`/api/wiki-meta/${d3.wiki_title}`).then(r=>r.json()).then(w => { if(w?.image) { const i=document.getElementById("huge-ava-3"); i.src=w.image; i.style.display="block"; } });
                            } else { podiumRow.classList.add("d-none"); }
                        } else { podiumRow.classList.add("d-none"); }
                    }).catch(() => { podiumRow.classList.add("d-none"); });
                } else { podiumRow.classList.add("d-none"); }
 
                loadWeekendSessions(race.round, race.is_past);
            }
 
            fetch("/api/calendar-list")
                .then(res => {
                    if (!res.ok) throw new Error(`calendar-list HTTP ${res.status}`);
                    return res.json();
                })
                .then(data => {
                if (!data || !Array.isArray(data.races)) throw new Error("invalid calendar-list payload");
                localRacesArray = data.races;
                let html = "";
                localRacesArray.forEach(race => {
                    let cardClass = race.is_past ? "past-race" : "";
                    let cardStyle = race.winner_name ? `style="background-color: ${race.team_color} !important; border-color: ${race.team_color} !important;"` : "";
                    let cardIdAttr = race.is_next ? 'id="next-active-race"' : '';
                    if (race.is_next) { cardClass = "current-race"; cardStyle = ""; }
                    if (race.winner_name && !race.is_next) { cardClass += " has-team-color"; }
                    let winnerBadge = race.winner_name ? `<div class="scroll-winner-container"><img class="scroll-winner-thumb" id="win-thumb-${race.round}" src="" alt="Win"><span class="scroll-winner-name">🏆 ${race.winner_name}</span></div>` : "";
                    html += `<div ${cardIdAttr} class="mini-race-card ${cardClass}" ${cardStyle} data-idx="${race.idx}"><div><div class="race-round text-danger text-uppercase">${race.round} ROUND</div><div class="race-title" title="${race.raceName}">${race.raceName.replace("Grand Prix", "GP")}</div><div class="race-loc text-white-50">📍 ${race.locality}</div></div>${winnerBadge}<div class="race-date text-warning">${race.date}</div></div>`;
                });
                scrollBox.innerHTML = html;
 
                localRacesArray.forEach(race => {
                    if (race.winner_wiki) {
                        fetch(`/api/wiki-meta/${race.winner_wiki}`).then(r=>r.json()).then(w => { const t = document.getElementById(`win-thumb-${race.round}`); if(t && w?.image) { t.src = w.image; t.style.display = "block"; } });
                    }
                });
 
                if(data.next_race_idx !== -1) {
                    const defRace = localRacesArray[data.next_race_idx];
                    const defCard = document.querySelector(`[data-idx="${data.next_race_idx}"]`);
                    if (defCard) defCard.classList.add("selected-card");
                    renderDetailPanel(defRace);
                }
                setTimeout(() => { const t = document.getElementById("next-active-race"); if (t) t.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' }); }, 200);
            }).catch(err => {
                console.error("캘린더 데이터 로드 실패:", err);
                scrollBox.innerHTML = `<div class="text-white-50 mx-auto d-flex align-items-center gap-2 py-4"><span>⚠️ 캘린더 데이터를 불러오지 못했습니다. 잠시 후 다시 시도해 주세요.</span></div>`;
                document.getElementById("detail-wiki").innerText = "레이스 일정을 불러오지 못했습니다. 새로고침 해주세요.";
                document.getElementById("detail-circuit-name").innerText = "데이터 로드 실패";
            });
 
            scrollBox.addEventListener("click", function(e) {
                const card = e.target.closest(".mini-race-card");
                if (!card) return;
                document.querySelectorAll(".mini-race-card").forEach(c => c.classList.remove("selected-card"));
                card.classList.add("selected-card");
                renderDetailPanel(localRacesArray[parseInt(card.getAttribute("data-idx"))]);
            });
        });
    </script>
</body>
</html>
