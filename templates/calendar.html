<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>🏎️ Calendar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #1f2124; color: white; }
        .scroll-box { display: flex; overflow-x: auto; gap: 10px; padding: 20px; }
        .card { flex: 0 0 200px; background: #333; padding: 15px; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="scroll-box" id="scroll-box"></div>
    <div class="container" id="detail-box">그랑프리를 선택하세요.</div>
    <script>
        fetch("/api/calendar-list").then(r=>r.json()).then(data => {
            let html = "";
            data.races.forEach((r, i) => {
                html += `<div class="card" onclick="showDetail(${i})"><h5>${r.raceName}</h5><p>${r.date}</p></div>`;
            });
            document.getElementById("scroll-box").innerHTML = html;
        });
        function showDetail(i) {
            // 상세 정보 표시 로직
        }
    </script>
</body>
</html>
