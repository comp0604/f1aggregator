<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>🏎️ Standings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: white; }
        .top5-wrapper { background: #1f2124; border-radius: 20px; padding: 2rem; margin-bottom: 2rem; }
        .standings-box { background-color: #1f2124; border-radius: 20px; padding: 1.5rem; }
        .table-f1 { color: white; }
        .color-row { border-left: 5px solid #555; }
        .back-btn { background: #e10600; color: white; border: none; padding: 0.5rem 1rem; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container py-4">
        <div class="top5-wrapper" id="top5-block">
            <h3 class="text-center mb-4">Championship Leaders</h3>
            <div class="d-flex justify-content-center gap-3" id="top-drivers-row"></div>
        </div>
        <div class="row g-4">
            <div class="col-md-6"><div class="standings-box"><table class="table table-f1"><tbody id="d-body"></tbody></table></div></div>
            <div class="col-md-6"><div class="standings-box"><table class="table table-f1"><tbody id="c-body"></tbody></table></div></div>
        </div>
        <button class="back-btn" onclick="location.href='/'">메인으로</button>
    </div>
    <script>
        fetch("/api/driver-standings").then(r=>r.json()).then(data => {
            const list = data.MRData.StandingsTable.StandingsLists[0].DriverStandings;
            let dHtml = "";
            list.forEach(item => {
                dHtml += `<tr class="color-row"><td>${item.position}</td><td>${item.Driver.familyName}</td><td>${item.points} P</td></tr>`;
            });
            document.getElementById("d-body").innerHTML = dHtml;
        });
        fetch("/api/constructor-standings").then(r=>r.json()).then(data => {
            const list = data.MRData.StandingsTable.StandingsLists[0].ConstructorStandings;
            let cHtml = "";
            list.forEach(item => {
                cHtml += `<tr class="color-row"><td>${item.position}</td><td>${item.Constructor.name}</td><td>${item.points} P</td></tr>`;
            });
            document.getElementById("c-body").innerHTML = cHtml;
        });
    </script>
</body>
</html>
