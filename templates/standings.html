<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏎️ LecLovF1 - Championship Standings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Malgun Gothic', sans-serif; margin: 0; padding: 0; }
        .f1-header { background-color: #e10600; color: white; padding: 1.2rem 0; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 2rem; }
        .f1-logo { color: white; text-decoration: none; font-weight: bold; font-size: 1.5rem; }
        .f1-logo:hover { color: rgba(255,255,255,0.8); }

        /* 🏆 상단 탑 5 드라이버 카드 디자인 */
        .top-driver-card {
            background-color: #1f2124;
            border: none;
            border-radius: 16px;
            color: white;
            padding: 1.25rem;
            text-align: center;
            position: relative;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
            overflow: hidden;
        }
        .top-driver-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 20px rgba(225, 6, 0, 0.15);
        }
        
        .rank-1 { border: 2px solid #ffc107; }
        .rank-2 { border: 2px solid #c0c0c0; }
        .rank-3 { border: 2px solid #cd7f32; }

        .card-rank-badge {
            position: absolute;
            top: 10px;
            left: 12px;
            font-size: 1.5rem;
            font-weight: 900;
            font-style: italic;
            opacity: 0.3;
        }
        .card-rank-badge.active-rank { opacity: 1; }

        .driver-avatar {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            object-fit: cover;
            object-position: center 15%;
            border: 3px solid rgba(255,255,255,0.2);
            background-color: #fff;
            margin: 0 auto 10px auto;
            display: none; 
        }

        .driver-name { font-size: 1.1rem; font-weight: bold; margin-bottom: 2px; }
        .driver-team { font-size: 0.8rem; opacity: 0.7; margin-bottom: 8px; }
        .driver-points { font-size: 1.2rem; font-weight: bold; color: #ffc107; }

        /* 🏛️ 하단 테이블 디자인 */
        .standings-box {
            background-color: #1f2124;
            border-radius: 20px;
            padding: 1.5rem;
            color: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            margin-bottom: 2rem;
        }
        .table-f1 { color: white !important; vertical-align: middle !important; }
        .table-f1 th { border-bottom: 2px solid #444 !important; font-weight: bold; color: #aaa; font-size: 0.9rem; }
        .table-f1 td { border-bottom: 1px solid #333 !important; font-size: 0.95rem; padding: 12px 8px !important; }
        
        .rank-num { font-weight: bold; font-style: italic; font-size: 1.1rem; width: 50px; }
        .pts-num { font-weight: bold; color: #ffc107; text-align: right; }
        .wins-num { text-align: center; color: #aaa; font-size: 0.85rem; }

        .back-btn { background-color: #212529; color: white; border: none; padding: 0.6rem 1.5rem; border-radius: 8px; font-weight: bold; transition: background-color 0.2s; }
        .back-btn:hover { background-color: #e10600; color: white; }
    </style>
</head>
<body>

    <header class="f1-header text-center">
        <div class="container">
            <h1 class="fw-bold m-0"><a href="/" class="f1-logo">🏎️ LecLovF1</a></h1>
        </div>
    </header>

    <div class="container mb-5">
        
        <h3 class="fw-bold text-dark mb-3">🏆 Championship Leaders (Top 5)</h3>
        <div class="row row-cols-2 row-cols-md-5 g-3 mb-5" id="top-drivers-cards-row">
            <div class="w-100 text-center text-muted py-3">드라이버 리더보드 데이터 동기화 중...</div>
        </div>

        <div class="row g-4">
            
            <div class="col-xl-6">
                <div class="standings-box">
                    <h4 class="fw-bold text-warning mb-3">🏁 Driver Standings</h4>
                    <div class="table-responsive">
                        <table class="table table-f1 table-hover m-0">
                            <thead>
                                <tr>
                                    <th scope="col" class="text-center">순위</th>
                                    <th scope="col">드라이버</th>
                                    <th scope="col">팀</th>
                                    <th scope="col" class="text-center">우승</th>
                                    <th scope="col" class="text-end">포인트</th>
                                </tr>
                            </thead>
                            <tbody id="drivers-table-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="col-xl-6">
                <div class="standings-box">
                    <h4 class="fw-bold text-success mb-3">🏢 Constructor Standings</h4>
                    <div class="table-responsive">
                        <table class="table table-f1 table-hover m-0">
                            <thead>
                                <tr>
                                    <th scope="col" class="text-center">순위</th>
                                    <th scope="col">컨스트럭터 팀</th>
                                    <th scope="col" class="text-center">우승</th>
                                    <th scope="col" class="text-end">포인트</th>
                                </tr>
                            </thead>
                            <tbody id="constructors-table-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>

        <div class="text-center mt-4"><button class="back-btn" onclick="location.href='/'">← 메인 대시보드로 돌아가기</button></div>

    </div>

<script>
        document.addEventListener("DOMContentLoaded", function() {
            const driversUrl = "https://api.jolpi.ca/ergast/f1/current/driverStandings.json";
            const constructorsUrl = "https://api.jolpi.ca/ergast/f1/current/constructorStandings.json";

            // 1. 드라이버 순위 바인딩
            fetch(driversUrl)
                .then(res => res.json())
                .then(data => {
                    const standingsList = data.MRData.StandingsTable.StandingsLists[0].DriverStandings;
                    
                    const top5 = standingsList.slice(0, 5);
                    let cardsHtml = "";
                    const medals = { "1": "🥇", "2": "🥈", "3": "🥉" };

                    top5.forEach(item => {
                        const rank = item.position;
                        const medalIcon = medals[rank] || "";
                        const borderClass = rank <= 3 ? `rank-${rank}` : "";
                        const badgeActive = rank <= 3 ? "active-rank" : "";
                        
                        // 🔥 [버그 수정] API가 배열(Constructors)로 내려주므로 첫 번째 팀 이름을 안전하게 추출합니다.
                        const teamName = item.Constructors && item.Constructors.length > 0 ? item.Constructors[0].name : "Unknown";

                        // 안전한 위키 URL 파싱
                        const wikiTitle = (item.Driver.url || "").split('/wiki/')[1] || "";

                        cardsHtml += `
                            <div class="col">
                                <div class="top-driver-card ${borderClass}">
                                    <div class="card-rank-badge ${badgeActive}">${medalIcon || rank}</div>
                                    <img id="card-avatar-${rank}" class="driver-avatar" src="" alt="Driver">
                                    <div class="driver-name">${item.Driver.givenName}<br>${item.Driver.familyName}</div>
                                    <div class="driver-team text-truncate" title="${teamName}">${teamName}</div>
                                    <div class="driver-points">${item.points} PTS</div>
                                </div>
                            </div>
                        `;
                    });
                    document.getElementById("top-drivers-cards-row").innerHTML = cardsHtml;

                    // 프로필 사진 순차 프록시 딜리버리
                    top5.forEach(item => {
                        const rank = item.position;
                        const wikiTitle = (item.Driver.url || "").split('/wiki/')[1];
                        if (wikiTitle) {
                            fetch(`/api/wiki-meta/${wikiTitle}`)
                                .then(r => r.json())
                                .then(w => {
                                    const img = document.getElementById(`card-avatar-${rank}`);
                                    if (img && w.image) {
                                        img.src = w.image; img.style.display = "block";
                                    }
                                });
                        }
                    });

                    let tableHtml = "";
                    standingsList.forEach(item => {
                        // 🔥 [버그 수정] 하단 테이블 렌더링 시에도 Constructors 배열로 접근합니다.
                        const teamName = item.Constructors && item.Constructors.length > 0 ? item.Constructors[0].name : "Unknown";
                        
                        tableHtml += `
                            <tr>
                                <td class="text-center rank-num">${item.position}</td>
                                <td><strong>${item.Driver.givenName} ${item.Driver.familyName}</strong> <small class="text-muted text-uppercase">(${item.Driver.code || ''})</small></td>
                                <td class="text-white-50">${teamName}</td>
                                <td class="text-center wins-num">${item.wins}</td>
                                <td class="pts-num">${item.points} P</td>
                            </tr>
                        `;
                    });
                    document.getElementById("drivers-table-body").innerHTML = tableHtml;
                })
                .catch(err => console.error("Driver Standings Error:", err));

            // 2. 팀 순위 바인딩
            fetch(constructorsUrl)
                .then(res => res.json())
                .then(data => {
                    const standingsList = data.MRData.StandingsTable.StandingsLists[0].ConstructorStandings;
                    let tableHtml = "";

                    standingsList.forEach(item => {
                        tableHtml += `
                            <tr>
                                <td class="text-center rank-num">${item.position}</td>
                                <td><strong>${item.Constructor.name}</strong></td>
                                <td class="text-center wins-num">${item.wins}</td>
                                <td class="pts-num">${item.points} P</td>
                            </tr>
                        `;
                    });
                    document.getElementById("constructors-table-body").innerHTML = tableHtml;
                })
                .catch(err => console.error("Constructor Standings Error:", err));
        });
    </script>
</body>
</html>
