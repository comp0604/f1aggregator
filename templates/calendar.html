<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📅 경기 일정 - LecLovF1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Malgun Gothic', sans-serif; }
        .f1-header { background-color: #e10600; color: white; padding: 2rem 0; margin-bottom: 2rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card { border: none; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .table-f1 th { background-color: #212529; color: white; text-align: center; }
        .table-f1 td { vertical-align: middle; text-align: center; }
        .past-race { color: #adb5bd; background-color: #f1f3f5 !important; }
        a { text-decoration: none; }
    </style>
</head>
<body>

    <header class="f1-header text-center">
        <div class="container">
            <h1 class="fw-bold">🏎️ LecLovF1</h1>
            <p class="lead mb-3">2026 시즌 F1 그랑프리 공식 경기 일정 및 서킷 정보</p>
            <div class="mt-3">
                <a href="/" class="btn btn-outline-light fw-bold px-4 me-2 shadow-sm">📰 최신 뉴스</a>
                <a href="/standings" class="btn btn-outline-light fw-bold px-4 me-2 shadow-sm">🏆 드라이버 순위</a>
                <a href="/calendar" class="btn btn-light text-danger fw-bold px-4 shadow-sm">📅 경기 일정</a>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="row">
            <div class="col-lg-9 mx-auto">
                <div class="card p-4">
                    <h3 class="h4 fw-bold mb-4 text-dark">🏁 2026 그랑프리 캘린더</h3>
                    
                    <div class="table-responsive">
                        <table class="table table-hover table-bordered table-f1 mb-0">
                            <thead>
                                <tr>
                                    <th style="width: 12%;">라운드</th>
                                    <th style="width: 35%;">그랑프리 대회명</th>
                                    <th style="width: 35%;">개최 서킷 및 위치</th>
                                    <th style="width: 18%;">결승 일자</th>
                                </tr>
                            </thead>
                            <tbody id="calendar-rows">
                                <tr>
                                    <td colspan="4" class="text-center py-5 text-muted">
                                        <div class="spinner-border text-danger" role="status" style="width: 1.5rem; height: 1.5rem;"></div>
                                        <span class="ms-2">2026 공식 일정을 불러오는 중...</span>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="text-center text-muted py-4 mt-5 border-top">
        <p>© 2026 F1 뉴스 애그리게이터 파이프라인 프로젝트</p>
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const apiUrl = "https://api.jolpi.ca/ergast/f1/2026.json";
            const tableBody = document.getElementById("calendar-rows");
            const today = new Date();

            fetch(apiUrl)
                .then(response => response.json())
                .then(data => {
                    const races = data.MRData.RaceTable.Races;
                    if (!races || races.length === 0) {
                        tableBody.innerHTML = `<tr><td colspan="4" class="text-center py-4 text-muted">일정이 아직 업데이트되지 않았습니다.</td></tr>`;
                        return;
                    }

                    let htmlContent = "";
                    races.forEach(race => {
                        const round = race.round;
                        const raceName = race.raceName;
                        const circuitName = race.Circuit.circuitName;
                        const locality = race.Circuit.Location.locality;
                        const country = race.Circuit.Location.country;
                        const raceDateStr = race.date;
                        
                        const raceDate = new Date(raceDateStr);
                        let rowClass = "";
                        if (raceDate < today) { rowClass = "past-race"; }

                        htmlContent += `
                            <tr class="${rowClass}">
                                <td class="fw-bold text-secondary">${round} 라운드</td>
                                <td class="text-start ps-3 fw-bold text-dark">${raceName}</td>
                                <td class="text-start ps-3 small text-muted">
                                    <strong>${circuitName}</strong><br>
                                    📍 ${locality}, ${country}
                                </td>
                                <td class="fw-bold">${raceDateStr}</td>
                            </tr>
                        `;
                    });
                    tableBody.innerHTML = htmlContent;
                })
                .catch(error => {
                    tableBody.innerHTML = `<tr><td colspan="4" class="text-center py-4 text-danger">⚠️ 일정을 불러올 수 없습니다.</td></tr>`;
                });
        });
    </script>
</body>
</html>
