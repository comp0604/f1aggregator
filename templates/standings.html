<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Standings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Malgun Gothic', sans-serif; }
        .f1-header { background-color: #e10600; color: white; padding: 1.5rem 0; margin-bottom: 2rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .f1-logo { color: white; text-decoration: none; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .table-f1 th { background-color: #212529; color: white; text-align: center; font-size: 0.9rem; }
        .table-f1 td { vertical-align: middle; text-align: center; font-size: 0.9rem; }
        .podium-1 { background-color: #fff3cd !important; font-weight: bold; }
        .podium-2 { background-color: #e2e3e5 !important; }
        .podium-3 { background-color: #f8d7da !important; }
    </style>
</head>
<body>

    <header class="f1-header text-center">
        <div class="container">
            <h1 class="fw-bold m-0"><a href="/" class="f1-logo">🏎️ LecLovF1</a></h1>
        </div>
    </header>

    <main class="container">
        <div class="row">
            <div class="col-lg-8 mx-auto">
                <div class="card p-4">
                    <div class="table-responsive">
                        <table class="table table-hover table-bordered table-f1 mb-0">
                            <thead>
                                <tr>
                                    <th style="width: 15%;">순위</th>
                                    <th style="width: 45%;">드라이버</th>
                                    <th style="width: 25%;">팀</th>
                                    <th style="width: 15%;">포인트</th>
                                </tr>
                            </thead>
                            <tbody id="standings-rows">
                                <tr>
                                    <td colspan="4" class="text-center py-5 text-muted">로드 중...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const apiUrl = "https://api.jolpi.ca/ergast/f1/2026/driverStandings.json";
            const tableBody = document.getElementById("standings-rows");

            fetch(apiUrl)
                .then(res => res.json())
                .then(data => {
                    const list = data.MRData.StandingsTable.StandingsLists[0].DriverStandings;
                    let htmlContent = "";

                    list.forEach(item => {
                        const pos = parseInt(item.position);
                        let rowClass = pos === 1 ? "podium-1" : pos === 2 ? "podium-2" : pos === 3 ? "podium-3" : "";

                        htmlContent += `
                            <tr class="${rowClass}">
                                <td class="fw-bold">${pos}</td>
                                <td class="text-start ps-4 fw-bold">${item.Driver.givenName} ${item.Driver.familyName}</td>
                                <td><span class="badge bg-secondary">${item.Constructors[0].name}</span></td>
                                <td class="fw-bold text-danger">${item.points} P</td>
                            </tr>
                        `;
                    });
                    tableBody.innerHTML = htmlContent;
                });
        });
    </script>
</body>
</html>
